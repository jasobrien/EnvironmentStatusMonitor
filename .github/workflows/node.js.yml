# Start the application once, then run all test runners against it.
# This mirrors the real-world usage: tests execute against an already-running application.

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Start the application once — all runners test against this instance
    - name: Start application
      run: node index.js &
      env:
        PORT: 8080

    - name: Wait for application
      run: npx wait-on http://localhost:8080 --timeout 30000

    # Run all test runners against the running application
    - name: Run Playwright Tests
      run: npx playwright test

    - name: Run Supertest Tests
      run: npm run test:supertest

    - name: Run Bruno Tests
      run: npm run test:bruno

    # Stop the application
    - name: Stop application
      if: always()
      run: kill $(lsof -t -i:8080) 2>/dev/null || true

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.node-version }}
        path: tests/playwright-report/
        retention-days: 30

