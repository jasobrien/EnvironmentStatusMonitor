<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Historical Results Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
        integrity="sha384-N+5bpyvQlOrCK9BzJk8+wwm1fY03n5m5w5MN5ql/Chj+SN/7zS9SxRn7CYuN+lAe" crossorigin="anonymous">
    </script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        $(function () {
            $("#header-container").load("/data/header");

            // Derive envId from URL path e.g. /data/devresults → "dev"
            const pathParts = window.location.pathname.split('/');
            const envRoute = pathParts[pathParts.length - 1];
            const envId = envRoute.replace('results', '');

            let currentRunner = null;

            function loadRunnerData(runner) {
                currentRunner = runner;
                document.getElementById('json-data').value = 'Loading…';
                fetch(`/data/editfile/${envId}results?runner=${encodeURIComponent(runner)}`)
                    .then(r => {
                        if (!r.ok) throw new Error(`HTTP ${r.status}`);
                        return r.text();
                    })
                    .then(data => {
                        document.getElementById('json-data').value = data;
                    })
                    .catch(err => {
                        document.getElementById('json-data').value = '';
                        console.error('Error loading data:', err);
                    });
            }

            // Load config: env display name + available runners
            Promise.all([
                fetch('/config').then(r => r.json()),
                fetch('/api/runners').then(r => r.json())
            ]).then(([config, runners]) => {
                const env = config.environments.find(e => e.id === envId);
                const displayName = env ? (env.displayName || env.name) : envId;
                document.getElementById('env-title').textContent = `Results Editor — ${displayName} History`;

                const select = document.getElementById('runner-select');
                runners.forEach(runner => {
                    const opt = document.createElement('option');
                    opt.value = runner;
                    opt.textContent = runner.charAt(0).toUpperCase() + runner.slice(1);
                    select.appendChild(opt);
                });

                // Auto-load first runner
                if (runners.length > 0) {
                    select.value = runners[0];
                    loadRunnerData(runners[0]);
                }

                select.addEventListener('change', function () {
                    loadRunnerData(this.value);
                });
            }).catch(err => console.error('Error loading config:', err));

            // Save button
            document.getElementById('save-button').addEventListener('click', function () {
                if (!currentRunner) return alert('Select a runner first.');
                const data = document.getElementById('json-data').value;
                fetch(`/data/editfile/${envId}results?runner=${encodeURIComponent(currentRunner)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'text/plain' },
                    body: data
                })
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.text();
                })
                .then(() => alert('Saved successfully!'))
                .catch(err => {
                    console.error('Error saving:', err);
                    alert('Save failed — check JSON format.');
                });
            });
        });
    </script>
</head>

<body class="p-4">
    <div id="header-container"></div>

    <main class="container-fluid">
        <div class="row mb-3">
            <div class="col-12">
                <h1 id="env-title">Results Editor — History</h1>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-3 col-sm-6">
                <label for="runner-select" class="form-label font-weight-bold">Runner</label>
                <select id="runner-select" class="form-control">
                    <option value="" disabled selected>Loading runners…</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <label for="json-data" class="sr-only">History data (NDJSON)</label>
                <textarea id="json-data" class="form-control" rows="30" style="font-size: 11px" aria-label="History data editor"></textarea>
                <div class="text-center mt-4">
                    <button id="save-button" class="btn btn-primary">Save</button>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
